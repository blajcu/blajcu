<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - Rekrutacja</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');
        body {
            font-family: 'Minecraftia', sans-serif;
            background-color: #1a1a1a;
            color: #AAAAAA;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { width: 100%; max-width: 900px; margin-top: 20px; }
        .top-nav { display: flex; justify-content: center; gap: 10px; }
        .mc-btn {
            flex: 1; padding: 15px 0; text-decoration: none; color: white;
            background-color: #4A4A4A; border: 3px solid #000;
            border-top-color: #8B8B8B; border-left-color: #8B8B8B;
            text-align: center; font-size: 10px; text-shadow: 2px 2px #000;
        }
        .container {
            margin-top: 40px; width: 90%; max-width: 800px;
            background-color: rgba(0, 0, 0, 0.85); border: 4px solid #373737;
            padding: 30px; text-align: center;
        }
        .faq-card { background: #262626; padding: 15px; border: 2px solid #555; margin-bottom: 15px; text-align: left; }
        .faq-card h2 { color: #55FFFF; font-size: 12px; margin: 0; }
        .recruitment { border-color: #55FF55; background: #1e2e1e; }
    </style>
</head>
<body>
    <header>
        <div class="top-nav">
            <a href="minecraft.html" class="mc-btn">Serwer MC</a>
            <a href="index.html" class="mc-btn">Główna</a>
            <a href="faq.html" class="mc-btn" style="background-color: #6a1b9a;">FAQ</a>
        </div>
    </header>

    <div class="container">
        <h1 style="color: #FFCC00;">FAQ & REKRUTACJA</h1>
        
        <div class="faq-card recruitment">
            <h2 style="color: #55FF55;">DOŁĄCZ DO ADMINISTRACJI!</h2>
            <p style="font-size: 11px;">Poszukujemy osób do zespołu! Zapraszamy na rekrutację na naszym Discordzie.</p>
        </div>

        <div class="faq-card">
            <h2>Jak zostać moderatorem?</h2>
            <p style="font-size: 11px;">Sprawdzaj kanał #rekrutacja na Discordzie.</p>
        </div>
    </div>
</body>
</html>
