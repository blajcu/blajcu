<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBBlajcu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fioletowy gradient na całe tło */
            background: linear-gradient(135deg, #1a0b2e 0%, #4b2c70 50%, #1a0b2e 100%);
            background-attachment: fixed;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Odstęp między sekcjami */
            text-align: center;
        }

        /* Wspólny styl dla wszystkich przycisków */
        .rect-btn {
            display: block;
            width: 100%;
            padding: 18px 0;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .rect-btn:hover {
            transform: scale(1.03);
            filter: brightness(1.2);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        /* Sekcja Nawigacji (Górne przyciski) */
        .nav-group, .social-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .title {
            font-size: 1.2rem;
            margin-bottom: 5px;
            opacity: 0.8;
            text-transform: lowercase;
            font-style: italic;
        }

        /* Kolory przycisków nawigacji */
        .btn-mc { background: linear-gradient(45deg, #2e7d32, #43a047); }
        .btn-home { background: rgba(255, 255, 255, 0.1); border: 2px solid #53FC18; color: #53FC18; }
        .btn-faq { background: linear-gradient(45deg, #7b1fa2, #9c27b0); }

        /* Kolory Social Media */
        .twitch { background-color: #9146FF; }
        .kick { background-color: #53FC18; color: black; }
        .youtube { background-color: #FF0000; }
        .discord { background-color: #5865F2; }
        .instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }

    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="nav-group">
            <div class="title">nawigacja</div>
            <a href="minecraft.html" class="rect-btn btn-mc">Minecraft</a>
            <a href="index.html" class="rect-btn btn-home">Strona Główna</a>
            <a href="faq.html" class="rect-btn btn-faq">FAQ</a>
        </div>

        <hr style="width: 50%; opacity: 0.2;">

        <div class="social-group">
            <div class="title">social media</div>
            <a href="TWÓJ_LINK" class="rect-btn twitch">Twitch</a>
            <a href="TWÓJ_LINK" class="rect-btn kick">Kick</a>
            <a href="TWÓJ_LINK" class="rect-btn youtube">YouTube</a>
            <a href="TWÓJ_LINK" class="rect-btn discord">Discord</a>
            <a href="TWÓJ_LINK" class="rect-btn instagram">Instagram</a>
        </div>

    </div>

</body>
</html>
