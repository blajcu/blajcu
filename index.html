<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBBlajcu</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        body {
            font-family: 'Minecraftia', sans-serif;
            background: #1a0b2e url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            width: 90%;
            max-width: 500px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 4px solid #373737;
            padding: 30px;
            text-align: center;
        }

        .title { color: #FFCC00; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }

        .mc-btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            background-color: #4A4A4A;
            border: 3px solid #000;
            border-top-color: #8B8B8B;
            border-left-color: #8B8B8B;
            font-size: 12px;
            text-shadow: 2px 2px #000;
        }

        .mc-btn:hover {
            background-color: #53FC18;
            color: black;
            text-shadow: none;
            border-top-color: #A9FF91;
            border-left-color: #A9FF91;
        }

        .active { background-color: #2e7d32; border-top-color: #66bb6a; border-left-color: #66bb6a; }
        
        /* Social colors */
        .twitch { border-left-color: #9146FF; }
        .discord { border-left-color: #5865F2; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="title">Nawigacja</div>
        <a href="minecraft.html" class="mc-btn">Serwer MC</a>
        <a href="index.html" class="mc-btn active">Strona Główna</a>
        <a href="faq.html" class="mc-btn">FAQ</a>
        
        <hr style="border: 0; border-top: 2px solid #373737; margin: 20px 0;">
        
        <div class="title">Social Media</div>
        <a href="#" class="mc-btn twitch">Twitch</a>
        <a href="#" class="mc-btn discord">Discord</a>
        <a href="#" class="mc-btn">Instagram</a>
    </div>
</body>
</html>
