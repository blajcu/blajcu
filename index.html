<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBBlajcu - Home</title>
    <style>
        /* Import czcionki Minecraft */
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        body {
            font-family: 'Minecraftia', sans-serif;
            /* Fioletowy gradient z teksturą Minecraft */
            background: linear-gradient(135deg, #1a0b2e 0%, #4b2c70 50%, #1a0b2e 100%);
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'), 
                              linear-gradient(135deg, #1a0b2e 0%, #4b2c70 50%, #1a0b2e 100%);
            background-attachment: fixed;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border: 4px solid #373737;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .title {
            font-size: 14px;
            margin-bottom: 10px;
            color: #FFCC00; /* Złoty MC */
            text-shadow: 2px 2px #3F3F00;
            text-transform: uppercase;
        }

        /* Styl przycisków Minecraft */
        .mc-btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 10px;
            text-decoration: none;
            color: white;
            background-color: #4A4A4A;
            border: 3px solid #000;
            border-top-color: #8B8B8B;
            border-left-color: #8B8B8B;
            text-align: center;
            font-size: 12px;
            text-shadow: 2px 2px #000;
            box-sizing: border-box;
            transition: all 0.1s;
        }

        .mc-btn:hover {
            background-color: #53FC18; /* Neonowy zielony przy najechaniu */
            color: black;
            text-shadow: none;
            border-top-color: #A9FF91;
            border-left-color: #A9FF91;
            transform: scale(1.02);
        }

        /* Grupy */
        .nav-group, .social-group {
            display: flex;
            flex-direction: column;
        }

        /* Specyficzne kolory dla przycisków (opcjonalne obramowania) */
        .btn-home {
            background-color: #2e7d32; /* Ciemnozielony dla aktywnej strony */
            border-top-color: #66bb6a;
            border-left-color: #66bb6a;
        }

        .twitch { border-left-color: #9146FF; border-top-color: #9146FF; }
        .kick { border-left-color: #53FC18; border-top-color: #53FC18; }
        .youtube { border-left-color: #FF0000; border-top-color: #FF0000; }
        .discord { border-left-color: #5865F2; border-top-color: #5865F2; }

    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="nav-group">
            <div class="title">nawigacja</div>
            <a href="minecraft.html" class="mc-btn">Minecraft</a>
            <a href="index.html" class="mc-btn btn-home">Strona Główna</a>
            <a href="faq.html" class="mc-btn">FAQ</a>
        </div>

        <hr style="width: 80%; border: 0; border-top: 2px solid #373737; margin: 10px auto;">

        <div class="social-group">
            <div class="title">social media</div>
            <a href="TWÓJ_LINK" class="mc-btn twitch">Twitch</a>
            <a href="TWÓJ_LINK" class="mc-btn kick">Kick</a>
            <a href="TWÓJ_LINK" class="mc-btn youtube">YouTube</a>
            <a href="mc-btn discord" class="mc-btn discord">Discord</a>
            <a href="TWÓJ_LINK" class="mc-btn instagram">Instagram</a>
        </div>

    </div>

</body>
</html>
