<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBBlajcu</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sekcja Nawigacji - Teraz jako duże przyciski */
        header {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .top-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* Wspólny styl dla wszystkich przycisków na stronie */
        .rect-btn {
            flex: 1;
            padding: 20px 0;
            text-decoration: none;
            color: white;
            border-radius: 5px; /* Delikatne zaokrąglenie dla prostokątnego kształtu */
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            font-size: 14px;
            transition: transform 0.2s, filter 0.2s;
        }

        .rect-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        /* Losowe/Wybrane kolory dla górnych przycisków */
        .btn-mc { background: linear-gradient(45deg, #2e7d32, #66bb6a); } /* Zielony */
        .btn-home { background: linear-gradient(45deg, #1565c0, #42a5f5); } /* Niebieski */
        .btn-faq { background: linear-gradient(45deg, #6a1b9a, #ab47bc); } /* Fioletowy */

        /* Sekcja Social Media */
        .container {
            margin-top: 20px;
            width: 100%;
            max-width: 900px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Specyficzne kolory social media */
        .twitch { background-color: #9146FF; }
        .kick { background-color: #53FC18; color: black; }
        .youtube { background-color: #FF0000; }
        .discord { background-color: #5865F2; }
        .instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }

    </style>
</head>
<body>

    <header>
        <div class="top-nav">
            <a href="minecraft.html" class="rect-btn btn-mc">Minecraft</a>
            <a href="index.html" class="rect-btn btn-home">Strona Główna</a>
            <a href="faq.html" class="rect-btn btn-faq">FAQ</a>
        </div>
    </header>

    <div class="container">
        <div class="social-links">
            <a href="TWÓJ_LINK" class="rect-btn twitch">Twitch</a>
            <a href="TWÓJ_LINK" class="rect-btn kick">Kick</a>
            <a href="TWÓJ_LINK" class="rect-btn youtube">YouTube</a>
            <a href="TWÓJ_LINK" class="rect-btn discord">Discord</a>
            <a href="TWÓJ_LINK" class="rect-btn instagram">Instagram</a>
        </div>
    </div>

</body>
</html>
