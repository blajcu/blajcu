<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBBlajcu</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Górny pasek (Bordowy) */
        header {
            background-color: #8b0015; /* Ciemnoczerwony/Bordowy */
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            padding: 15px 0;
            border-radius: 5px;
        }

        .top-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Sekcja Social Media */
        .container {
            margin-top: 40px;
            width: 100%;
            max-width: 900px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 140px;
            padding: 15px 0;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.05); }

        /* Kolory przycisków z Twojego obrazka */
        .twitch { background-color: #9146FF; }
        .kick { background-color: #53FC18; color: black; }
        .youtube { background-color: #FF0000; }
        .discord { background-color: #5865F2; }
        .instagram { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }

    </style>
</head>
<body>

    <header>
        <div class="top-nav">
            <a href="minecraft.html" class="nav-item">MINECRAFT</a>
            <a href="index.html" class="nav-item">STRONA GŁÓWNA</a>
            <a href="faq.html" class="nav-item">FAQ</a>
        </div>
    </header>

    <div class="container">
        <div class="social-links">
            <a href="TWÓJ_LINK" class="btn twitch">Twitch</a>
            <a href="TWÓJ_LINK" class="btn kick">Kick</a>
            <a href="TWÓJ_LINK" class="btn youtube">YouTube</a>
            <a href="TWÓJ_LINK" class="btn discord">Discord</a>
            <a href="TWÓJ_LINK" class="btn instagram">Instagram</a>
        </div>
    </div>

</body>
</html>
