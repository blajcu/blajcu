<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blajcu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Sekcja linków głównych */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* Kolory marek */
        .twitch { background-color: #9146FF; }
        .kick { background-color: #53FC18; color: black; }
        .youtube { background-color: #FF0000; }
        .discord { background-color: #5865F2; }
        .instagram { background-image: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        /* Dolny pasek nawigacji */
        footer {
            background-color: #1a1a1a;
            padding: 20px 0;
            border-top: 2px solid #333;
        }

        .bottom-nav {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .nav-item {
            color: #aaa;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .nav-item:hover { color: #fff; }
        .active { color: #53FC18; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Moje Social Media</h1>
        <div class="social-links">
            <a href="LINK_DO_TWITCH" class="btn twitch">Twitch</a>
            <a href="LINK_DO_KICK" class="btn kick">Kick</a>
            <a href="LINK_DO_YOUTUBE" class="btn youtube">YouTube</a>
            <a href="LINK_DO_DISCORD" class="btn discord">Discord</a>
            <a href="LINK_DO_INSTAGRAM" class="btn instagram">Instagram</a>
        </div>
    </div>

    <footer>
        <div class="bottom-nav">
            <a href="minecraft.html" class="nav-item">Serwer Minecraft</a>
            <a href="index.html" class="nav-item active">Strona Główna</a>
            <a href="faq.html" class="nav-item">FAQ</a>
        </div>
    </footer>

</body>
</html>
