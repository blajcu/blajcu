<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBBlajcu</title>
    <style>
        /* Import klimatycznych czcionek */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=MedievalSharp&display=swap');

        body {
            margin: 0;
            padding: 0;
            /* Ciemne, mroczne tło z teksturą */
            background: #0a0a0a url('https://www.transparenttextures.com/patterns/dark-leather.png');
            color: #d1c2a0; /* Kolor starego złota/papieru */
            font-family: 'MedievalSharp', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .witcher-container {
            width: 90%;
            max-width: 450px;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #5c0000; /* Krwista czerwień obramowania */
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(92, 0, 0, 0.3);
            text-align: center;
            position: relative;
        }

        /* Ozdobne rogi */
        .witcher-container::before {
            content: "⚔";
            position: absolute;
            top: -15px;
            font-size: 24px;
            background: #0a0a0a;
            padding: 0 10px;
            color: #5c0000;
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            color: #eee;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-bottom: 1px solid #5c0000;
            padding-bottom: 10px;
        }

        .section-title {
            font-size: 0.9rem;
            color: #888;
            margin: 20px 0 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Styl przycisków - jak tablice ogłoszeń/interfejs */
        .w3-btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 10px 0;
            text-decoration: none;
            color: #d1c2a0;
            background: linear-gradient(to right, #1a1a1a, #262626, #1a1a1a);
            border: 1px solid #3d3d3d;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        .w3-btn:hover {
            color: #fff;
            border-color: #ff0000;
            background: #330000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            transform: scale(1.02);
        }

        /* Czerwony pasek przy najechaniu */
        .w3-btn::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #ff0000;
            transition: all 0.4s ease;
            transform: translateX(-50%);
        }

        .w3-btn:hover::after {
            width: 80%;
        }

        .active-page {
            border: 1px solid #5c0000;
            background: #1a0000;
        }

        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #5c0000, transparent);
            margin: 20px 0;
        }

    </style>
</head>
<body>

    <div class="witcher-container">
        <h1>BBBlajcu</h1>
        
        <div class="section-title">Eksploracja</div>
        <a href="minecraft.html" class="w3-btn">Zlecenia (Minecraft)</a>
        <a href="index.html" class="w3-btn active-page">Główny Szlak</a>
        <a href="faq.html" class="w3-btn">Bestiariusz (FAQ)</a>

        <hr>

        <div class="section-title">Znaki i Kontakty</div>
        <a href="TWÓJ_LINK" class="w3-btn">Twitch</a>
        <a href="TWÓJ_LINK" class="w3-btn">Kick</a>
        <a href="TWÓJ_LINK" class="w3-btn">Discord</a>
        <a href="TWÓJ_LINK" class="w3-btn">Instagram</a>
    </div>

</body>
</html>
