<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBBlajcu</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        body {
            font-family: 'Minecraftia', sans-serif;
            background: #1a0b2e url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            width: 90%;
            max-width: 500px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 4px solid #373737;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .title { 
            color: #FFCC00; 
            font-size: 14px; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            text-shadow: 2px 2px #3F3F00;
        }

        .mc-btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            background-color: #4A4A4A;
            border: 3px solid #000;
            border-top-color: #8B8B8B;
            border-left-color: #8B8B8B;
            font-size: 12px;
            text-shadow: 2px 2px #000;
            box-sizing: border-box;
            transition: all 0.1s;
        }

        .mc-btn:hover {
            background-color: #53FC18;
            color: black;
            text-shadow: none;
            border-top-color: #A9FF91;
            border-left-color: #A9FF91;
            transform: scale(1.02);
        }

        .active { 
            background-color: #2e7d32; 
            border-top-color: #66bb6a; 
            border-left-color: #66bb6a; 
        }
        
        /* Akcenty kolorystyczne dla Sociali na lewej krawędzi */
        .twitch { border-left-color: #9146FF; }
        .kick { border-left-color: #53FC18; }
        .youtube { border-left-color: #FF0000; }
        .discord { border-left-color: #5865F2; }
        .instagram { border-left-color: #E1306C; }

        hr {
            border: 0;
            border-top: 2px solid #373737;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="title">Nawigacja</div>
        <a href="minecraft.html" class="mc-btn">Serwer MC</a>
        <a href="index.html" class="mc-btn active">Strona Główna</a>
        <a href="faq.html" class="mc-btn">FAQ</a>
        
        <hr>
        
        <div class="title">Social Media</div>
        <a href="LINK_TWITCH" class="mc-btn twitch">Twitch</a>
        <a href="LINK_KICK" class="mc-btn kick">Kick</a>
        <a href="LINK_YOUTUBE" class="mc-btn youtube">YouTube</a>
        <a href="LINK_DISCORD" class="mc-btn discord">Discord</a>
        <a href="LINK_INSTAGRAM" class="mc-btn instagram">Instagram</a>
    </div>

</body>
</html>
